<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>POPKID XMD 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
  --gold: #d4af37;
  --gold-light: #f0d060;
  --gold-dim: rgba(212,175,55,0.12);
  --red: #8b0000;
  --black: #06030a;
  --card: rgba(8,4,12,0.82);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--black);
  color: var(--gold);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

/* BG glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(139,0,0,0.5) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 95%, rgba(212,175,55,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 35% 45% at 8% 65%, rgba(92,0,0,0.28) 0%, transparent 55%);
  animation: bgPulse 9s ease-in-out infinite alternate;
  z-index: 0;
  pointer-events: none;
}
@keyframes bgPulse { from { opacity:.75; } to { opacity:1; } }

/* Grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: .55;
}

/* Wrapper */
.wrap {
  position: relative;
  z-index: 2;
  width: 94%;
  max-width: 520px;
  padding: 48px 40px 40px;
  animation: fadeUp .75s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Glass card */
.card {
  position: absolute;
  inset: 0;
  border-radius: 24px;
  background: var(--card);
  backdrop-filter: blur(22px) saturate(1.5);
  border: 1px solid rgba(212,175,55,0.18);
  box-shadow:
    0 0 0 1px rgba(139,0,0,0.18),
    0 24px 70px rgba(0,0,0,0.85),
    0 0 80px rgba(212,175,55,0.07);
}

/* Corner ornaments */
.c { position:absolute; width:22px; height:22px; border-color:rgba(212,175,55,.55); border-style:solid; pointer-events:none; z-index:3; }
.c-tl { top:14px; left:14px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.c-tr { top:14px; right:14px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
.c-bl { bottom:14px; left:14px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
.c-br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

/* Top glow line on card */
.glow-top {
  position: absolute;
  top: 0; left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.5), transparent);
  border-radius: 0 0 4px 4px;
  z-index: 3;
}

/* Content */
.content { position:relative; z-index:2; text-align:center; }

/* Logo */
.logo { display:flex; justify-content:center; margin-bottom:22px; }
.logo-ring {
  position: relative;
  width: 90px;
  height: 90px;
}
.logo-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), var(--red), var(--gold-light), #5c0000, var(--gold));
  animation: spinRing 7s linear infinite;
  z-index: 0;
}
.logo-ring::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 50%;
  background: var(--black);
  z-index: 1;
}
@keyframes spinRing { to { transform:rotate(360deg); } }
.logo img {
  position: relative; z-index: 2;
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  box-shadow: 0 0 22px rgba(212,175,55,.45);
}

/* Title */
h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.45rem, 5vw, 2.1rem);
  font-weight: 900;
  letter-spacing: .05em;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), #b8860b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  line-height: 1.2;
}

.subtitle {
  font-size: .82rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(212,175,55,.4);
  margin-bottom: 26px;
}

/* Status bar */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-weight: 600;
  font-size: .82rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: rgba(212,175,55,.65);
  padding: 9px 14px;
  border-top: 1px solid rgba(212,175,55,.2);
  border-bottom: 1px solid rgba(212,175,55,.2);
  background: rgba(212,175,55,.03);
  border-radius: 6px;
}
.status-bar::before, .status-bar::after {
  content: '◆';
  font-size: .45rem;
  opacity: .4;
}

.pulse-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px #22c55e;
  animation: pdot 2s ease-in-out infinite;
  vertical-align: middle;
  margin-right: 5px;
}
@keyframes pdot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.35; transform:scale(.65); }
}

/* Sections */
.section {
  margin-bottom: 18px;
  padding: 22px 20px;
  border-radius: 14px;
  border: 1px solid rgba(212,175,55,.16);
  background: linear-gradient(135deg, rgba(139,0,0,.07), rgba(212,175,55,.03));
  position: relative;
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s;
  text-align: left;
}
.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.4), transparent);
}
.section:hover {
  border-color: rgba(212,175,55,.35);
  box-shadow: 0 0 28px rgba(212,175,55,.06);
}

.section h3 {
  font-family: 'Cinzel', serif;
  font-size: .88rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: rgba(212,175,55,.75);
  letter-spacing: .12em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 9px;
}
.section h3 i { font-size: .8rem; opacity: .7; }

/* Button grid */
.btn-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* Buttons */
.btn {
  position: relative;
  flex: 1;
  min-width: 130px;
  background: transparent;
  border: 1px solid rgba(212,175,55,.38);
  padding: 11px 20px;
  border-radius: 9px;
  color: var(--gold);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .25s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(139,0,0,.65), rgba(212,175,55,.22));
  opacity: 0;
  transition: opacity .25s;
  border-radius: 8px;
}
.btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
  transition: left .42s ease;
}
.btn:hover {
  border-color: var(--gold);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(212,175,55,.25), 0 5px 18px rgba(0,0,0,.5);
}
.btn:hover::before { opacity: 1; }
.btn:hover::after  { left: 140%; }
.btn:active { transform: translateY(0) scale(.97); }
.btn span, .btn i { position: relative; z-index: 1; }
.btn i { font-size: .8rem; opacity: .8; }

/* Primary btn */
.btn-primary {
  border-color: rgba(212,175,55,.6);
  background: linear-gradient(135deg, rgba(139,0,0,.35), rgba(212,175,55,.1));
}
.btn-primary::before {
  background: linear-gradient(135deg, rgba(139,0,0,.9), rgba(212,175,55,.4));
}

/* Footer */
.footer {
  margin-top: 24px;
  font-size: .78rem;
  letter-spacing: .07em;
  color: rgba(212,175,55,.32);
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.footer-line {
  width: 55px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.3), transparent);
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card"></div>
  <div class="glow-top"></div>
  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <div class="content">
    <div class="logo">
      <div class="logo-ring">
        <img src="https://files.catbox.moe/j9ia5c.png" alt="POPKID Logo">
      </div>
    </div>

    <h1>POPKID XMD 2026</h1>
    <div class="subtitle">WhatsApp Bot Session Manager</div>

    <div class="status-bar">
      <div><span class="pulse-dot"></span><span id="time-val"></span></div>
      <div id="date-val"></div>
      <div id="battery-status"><i class="fas fa-battery-full"></i></div>
    </div>

    <div class="section">
      <h3><i class="fas fa-key"></i> Get Session ID</h3>
      <div class="btn-grid">
        <button class="btn btn-primary" onclick="window.open('/pair')">
          <i class="fas fa-mobile-screen-button"></i>
          <span>Pair Code</span>
        </button>
      </div>
    </div>

    <div class="section">
      <h3><i class="fas fa-circle-nodes"></i> Developer & Community</h3>
      <div class="btn-grid">
        <button class="btn" onclick="window.open('https://github.com/popkidmain')">
          <i class="fab fa-github"></i><span>GitHub</span>
        </button>
        <button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T')">
          <i class="fab fa-whatsapp"></i><span>Channel</span>
        </button>
      </div>
    </div>

    <div class="footer">
      <div class="footer-line"></div>
      <div>Made with passion by popkid</div>
      <div>By popkidprojects ❤️‍🩹</div>
    </div>
  </div>
</div>

<script>
function updateTime() {
  const t = new Date();
  document.getElementById('time-val').textContent = t.toLocaleTimeString();
  document.getElementById('date-val').textContent = t.toLocaleDateString();
}
function updateBatteryStatus() {
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      document.getElementById('battery-status').textContent =
        Math.round(b.level * 100) + '% | ' + (b.charging ? 'Charging' : 'Battery');
    });
  }
}
setInterval(updateTime, 1000);
updateTime();
updateBatteryStatus();
</script>

</body>
</html>
